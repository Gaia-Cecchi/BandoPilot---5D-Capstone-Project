# Eval config for BandoPilot.
#
# The LLM-level check runs a LOCAL custom code metric (execution: local by
# default) so it needs no GCP project — it grades the real agent traces produced
# by `agents-cli eval generate` in AI Studio mode.
#
# The deterministic eligibility/retrieval precision/recall metrics live in
# tests/eval/domain_eval.py (run separately).

metrics_to_run:
  - trajectory_eleggibilita

custom_metrics:
  # Trajectory eval: for an eligibility question, did the agent actually USE the
  # verification tool, CITE a clause code (R1, R2, ...), and surface the
  # DEADLINE? Grades the reasoning path, not just the final answer.
  - name: trajectory_eleggibilita
    custom_function: |
      def evaluate(instance):
          import re

          data = instance.get("agent_data") or {}
          call_names = []
          texts = []
          for turn in data.get("turns", []):
              for ev in turn.get("events", []):
                  content = ev.get("content") or {}
                  for part in (content.get("parts") or []):
                      fc = part.get("function_call")
                      if fc and fc.get("name"):
                          call_names.append(fc["name"])
                      fr = part.get("function_response")
                      if fr and fr.get("response") is not None:
                          texts.append(str(fr.get("response")))
                      if part.get("text"):
                          texts.append(part["text"])

          resp = instance.get("response") or {}
          final = " ".join(p.get("text", "") for p in (resp.get("parts") or []))
          blob = (final + " " + " ".join(texts))
          blob_low = blob.lower()

          tool_ok = ("verifica_eleggibilita" in call_names) or ("eligibility_agent" in call_names)
          cited = bool(re.search(r"\bR[1-9]\b", blob))
          deadline = ("scaden" in blob_low) or ("scadut" in blob_low)

          score = 0.5 * float(tool_ok) + 0.25 * float(cited) + 0.25 * float(deadline)
          explanation = (
              "tool_verifica=%s | citazione_clausola=%s | scadenza_menzionata=%s"
              % (tool_ok, cited, deadline)
          )
          return {"score": score, "explanation": explanation}
